<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket Dashboard</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e2f2;
      --text: #162134;
      --accent: #0b63f3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 14px 18px; background: #0f1e3c; color: #fff; font-weight: 700; }
    main { padding: 16px; display: grid; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, select, textarea, button { border-radius: 8px; border: 1px solid var(--line); padding: 8px 10px; font-size: 14px; }
    button { background: var(--accent); color: #fff; border: none; cursor: pointer; }
    button.ghost { background: #eef3ff; color: #123; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 6px; text-align: left; }
    th { background: #f2f6ff; }
    .list { margin: 0; padding-left: 18px; }
    .muted { color: #567; font-size: 12px; }
    textarea { min-height: 90px; width: 100%; }
  </style>
</head>
<body>
  <header>Discord Ticket Dashboard</header>
  <main>
    <section class="card">
      <div class="row">
        <input id="token" placeholder="DASHBOARD_TOKEN" style="min-width:260px" />
        <button id="saveToken">토큰 저장</button>
        <select id="guild"></select>
        <button id="load">불러오기</button>
      </div>
      <p class="muted">같은 PC에서 <code>http://localhost:8787</code> 접속 후 사용하세요.</p>
    </section>

    <section class="card">
      <h3>관리자 권한</h3>
      <div class="row">
        <select id="memberSelect"></select>
        <button id="addManagerUser">사용자 추가</button>
        <button id="removeManagerUser" class="ghost">사용자 제거</button>
      </div>
      <div class="row" style="margin-top:8px">
        <select id="roleSelect"></select>
        <button id="addManagerRole">역할 추가</button>
        <button id="removeManagerRole" class="ghost">역할 제거</button>
      </div>
      <p id="managerSummary" class="muted"></p>
    </section>

    <section class="card">
      <h3>임베드 공지 전송</h3>
      <div class="row"><select id="embedChannel" style="min-width:260px"></select></div>
      <div class="row"><input id="embedTitle" placeholder="제목" style="min-width:260px" /><input id="embedColor" value="#2b8cff" style="width:110px" /></div>
      <textarea id="embedDesc" placeholder="공지 내용"></textarea>
      <div class="row"><button id="sendEmbed">임베드 전송</button><span id="embedResult" class="muted"></span></div>
    </section>

    <section class="card">
      <h3>Open Tickets</h3>
      <table id="openTable"><thead><tr><th>No</th><th>Type</th><th>Owner</th><th>Channel</th><th>Created</th></tr></thead><tbody></tbody></table>
    </section>

    <section class="card">
      <h3>Closed Tickets</h3>
      <table id="closedTable"><thead><tr><th>No</th><th>Type</th><th>Owner</th><th>Closed</th><th>Reason</th></tr></thead><tbody></tbody></table>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
